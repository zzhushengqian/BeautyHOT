name: BeautyHOT Personal Daily

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * *"
      timezone: "Asia/Shanghai"

permissions:
  contents: write
  models: read

concurrency:
  group: beautyhot-personal-daily
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Refresh private personal feed
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/refresh_daily.py
      - name: Save private daily data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "daily: refresh private BeautyHOT feed"
          git push